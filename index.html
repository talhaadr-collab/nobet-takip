<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-size:14px; padding:14px; font-family:sans-serif; word-break:break-all;">
  <div id="result">Test başlıyor...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzRwDhYWXAXCkSGctMxRC0Qyq75YgvvC7isdKuGHJOog2VG3k3Dm9gUInsH896aa6klIg/exec';
    const resultEl = document.getElementById('result');
    let log = [];
    function addLog(msg) { log.push(msg); resultEl.innerHTML = log.join('<br><br>'); }

    function testCall(label, url) {
      return new Promise((resolve) => {
        const cbName = '_t_' + Date.now() + '_' + Math.floor(Math.random()*10000);
        const fullUrl = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        const script = document.createElement('script');
        const timeout = setTimeout(() => { addLog(label + ': ❌ TIMEOUT'); resolve(); }, 8000);
        window[cbName] = (data) => { clearTimeout(timeout); addLog(label + ': ✓ OK'); resolve(); };
        script.onerror = () => { clearTimeout(timeout); addLog(label + ': ❌ SCRIPT ERROR'); resolve(); };
        script.src = fullUrl;
        document.body.appendChild(script);
      });
    }

    async function runTests() {
      // K: action=getAll ama "login" kelimesi başka bir parametrede geçiyor
      await testCall('K) getAll + login kelimesi başka yerde', API_URL + '?action=getAll&note=login');

      // L: action=xyz (login değil, getAll de değil - tamamen farklı zararsız isim)
      await testCall('L) action=xyz (rastgele isim)', API_URL + '?action=xyz');

      // M: action=getShifts (zaten var olan başka bir action, login değil)
      await testCall('M) action=getShifts', API_URL + '?action=getShifts');

      // N: action=signin (login yerine farklı kelime - henüz Apps Script'te tanımlı değil ama deneyelim)
      await testCall('N) action=signin', API_URL + '?action=signin');

      addLog('<br><b>TÜM TESTLER BİTTİ</b>');
    }
    runTests();
  </script>
</body>
</html>
