<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-size:14px; padding:14px; font-family:sans-serif; word-break:break-all;">
  <div id="result">Test başlıyor...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzRwDhYWXAXCkSGctMxRC0Qyq75YgvvC7isdKuGHJOog2VG3k3Dm9gUInsH896aa6klIg/exec';
    const resultEl = document.getElementById('result');
    let log = [];
    function addLog(msg) { log.push(msg); resultEl.innerHTML = log.join('<br><br>'); }

    function testCall(label, url) {
      return new Promise((resolve) => {
        const cbName = '_t_' + Date.now() + '_' + Math.floor(Math.random()*10000);
        const fullUrl = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        const script = document.createElement('script');
        const timeout = setTimeout(() => { addLog(label + ': ❌ TIMEOUT'); resolve(); }, 8000);
        window[cbName] = (data) => { clearTimeout(timeout); addLog(label + ': ✓ OK - ' + JSON.stringify(data).slice(0,100)); resolve(); };
        script.onerror = () => { clearTimeout(timeout); addLog(label + ': ❌ SCRIPT ERROR'); resolve(); };
        script.src = fullUrl;
        document.body.appendChild(script);
      });
    }

    async function runTests() {
      // G: action + 2 param ama isimler username/pwd değil, kısa
      await testCall('G) action+u+p (kısa isim)', API_URL + '?action=login&u=admin&p=1234');

      // H: tek parametre, değerler birleşik
      await testCall('H) action + tek combo param', API_URL + '?action=login&c=admin:1234');

      // I: action+username+pwd ama farklı sırada (callback önce)
      const cbName2 = '_t_' + Date.now() + '_x';
      await new Promise((resolve) => {
        const url2 = API_URL + '?callback=' + cbName2 + '&action=login&username=admin&pwd=1234';
        const script = document.createElement('script');
        const timeout = setTimeout(() => { addLog('I) callback en başta: ❌ TIMEOUT'); resolve(); }, 8000);
        window[cbName2] = (data) => { clearTimeout(timeout); addLog('I) callback en başta: ✓ OK'); resolve(); };
        script.onerror = () => { clearTimeout(timeout); addLog('I) callback en başta: ❌ SCRIPT ERROR'); resolve(); };
        script.src = url2;
        document.body.appendChild(script);
      });

      // J: action=login ama username/pwd YOK (eksik login denemesi gibi)
      await testCall('J) sadece action=login, param yok', API_URL + '?action=login');

      addLog('<br><b>TÜM TESTLER BİTTİ</b>');
    }
    runTests();
  </script>
</body>
</html>
